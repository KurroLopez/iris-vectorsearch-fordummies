<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies - Vector Search</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 50px 0;
        }
        .main-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }
        .movie-list-container {
            max-height: 70vh; /* Adjust as needed */
            overflow-y: auto;
            border-right: 1px solid #eee;
            padding-right: 15px;
        }
        .movie-list-item {
            cursor: pointer;
            padding: 10px 5px;
            border-bottom: 1px solid #f8f9fa;
        }
        .movie-list-item:hover {
            background-color: #f0f0f0;
        }
        .movie-list-item.active {
            background-color: #007bff;
            color: white;
        }
        .movie-details img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container main-container">
        <h1 class="text-center mb-4 text-primary">Movie Search</h1>
        <div class="row">
            <div class="col-md-4 movie-list-container">
                <ul class="list-group" id="movie-list">
                    <!-- Movie list will be loaded here -->
                </ul>
            </div>
            <div class="col-md-8 movie-details" id="movie-details">
                <!-- Movie details will be loaded here -->
                <p class="text-center text-muted mt-5">Select a movie from the left to see details.</p>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let movieListElement;
        let movieDetailsElement;

        // Function to clear recommendations
        function clearRecommendations() {
            const recommendationsListElement = document.getElementById('recommendations-list');
            if (recommendationsListElement) {
                recommendationsListElement.innerHTML = '';
            }
        }

        // Function to fetch recommendations
        async function fetchRecommendations(id) {
            try {
                const response = await fetch(`/vector/api/movies/recommendations/${id}`);
                const data = await response.json();
                displayRecommendations(data.InfoMovies);
            } catch (error) {
                console.error(`Error fetching recommendations for ID ${id}:`, error);
                const recommendationsListElement = document.getElementById('recommendations-list');
                if (recommendationsListElement) {
                    recommendationsListElement.innerHTML = '<p class="text-center text-danger mt-3">Error loading recommendations.</p>';
                }
            }
        }

        // Function to display recommendations
        function displayRecommendations(recommendations) {
            const recommendationsListElement = document.getElementById('recommendations-list');
            if (!recommendationsListElement) return;

            recommendationsListElement.innerHTML = '<h4 class="text-primary">Recommended Movies:</h4>';
            const ul = document.createElement('ul');
            ul.classList.add('list-group');
            recommendations.forEach(recMovie => {
                const li = document.createElement('li');
                li.classList.add('list-group-item', 'd-flex', 'justify-content-between', 'align-items-center');
                li.innerHTML = `
                    ${recMovie.Title} (${recMovie.Year}) - ${recMovie.Percentage.toFixed(2)}% similarity
                    <a href="#" onclick="event.preventDefault(); fetchMovieDetails(${recMovie.Id});" class="btn btn-sm btn-outline-primary">View Info</a>
                `;
                ul.appendChild(li);
            });
            recommendationsListElement.appendChild(ul);
        }

        // Function to fetch all movies
        async function fetchMovies() {
            try {
                const response = await fetch('/vector/api/movies');
                const data = await response.json();
                displayMovies(data.Movies);
            } catch (error) {
                console.error('Error fetching movies:', error);
                movieListElement.innerHTML = '<li class="list-group-item text-danger">Error loading movies.</li>';
            }
        }

        // Function to display movies in the list
        function displayMovies(movies) {
            movieListElement.innerHTML = '';
            movies.forEach(movie => {
                const listItem = document.createElement('li');
                listItem.classList.add('list-group-item', 'movie-list-item');
                listItem.dataset.movieId = movie.Id;
                listItem.textContent = `${movie.Title} (${movie.Year})`;
                listItem.addEventListener('click', () => {
                    // Remove active class from previous selection
                    const currentActive = document.querySelector('.movie-list-item.active');
                    if (currentActive) {
                        currentActive.classList.remove('active');
                    }
                    // Add active class to current selection
                    listItem.classList.add('active');
                    fetchMovieDetails(movie.Id);
                });
                movieListElement.appendChild(listItem);
            });
        }

        // Function to fetch movie details
        async function fetchMovieDetails(id) {
            try {
                const response = await fetch(`/vector/api/movies/${id}`);
                const data = await response.json();
                displayMovieDetails(data.InfoMovie);
            } catch (error) {
                console.error(`Error fetching movie details for ID ${id}:`, error);
                movieDetailsElement.innerHTML = '<p class="text-center text-danger mt-3">Error loading movie details.</p>';
            }
        }

        // Function to display movie details
        function displayMovieDetails(movie) {
            movieDetailsElement.innerHTML = `
                <div class=\"card\">
                    <div class=\"row g-0\">
                        <div class=\"col-md-4\" style=\"display: flex; justify-content: center; align-items: center;\">\
                            <img src=\"${movie.Link}\" class=\"img-fluid rounded-start\" style=\"width: 200%\" alt=\"${movie.Title} Poster\" onerror=\"this.style.display='none'; this.nextElementSibling.style.display='block';\">
                            <span style="display: none; color: gray; text-align: center;">Not available</span>
                        </div>
                        <div class=\"col-md-8\">\
                            <div class=\"card-body\">\
                                <h2 class=\"card-title text-primary\">${movie.Title} (${movie.Year})</h2>\
                                <p class=\"card-text\"><strong>Runtime:</strong> ${movie.Runtime} min</p>\
                                <p class=\"card-text\"><strong>Certificate:</strong> ${movie.Certificate}</p>\
                                <p class=\"card-text\"><strong>Genre:</strong> ${movie.Genre}</p>\
                                <p class=\"card-text\"><strong>Rating:</strong> ${movie.Rating}</p>\
                                <p class=\"card-text\"><strong>Director:</strong> ${movie.Director}</p>\
                                <p class=\"card-text\"><strong>Main Characters:</strong> ${movie.Star1}, ${movie.Star2}, ${movie.Star3}, ${movie.Star4}</p>\
                                <p class=\"card-text mt-3\">${movie.Overview}</p>\
                            </div>\
                        </div>\
                    </div>\
                </div>\
                <div class=\"mt-3\">\
                    <button class=\"btn btn-primary me-2\" onclick=\"fetchRecommendations(${movie.Id})\">Recommendations</button>\
                    <button class=\"btn btn-secondary\" onclick=\"clearRecommendations()\">Clear</button>\
                </div>\
                <div id=\"recommendations-list\" class=\"mt-4\">\
                    <!-- Recommendations will be loaded here -->\
                </div>
            `;
        }

        document.addEventListener('DOMContentLoaded', () => {
            movieListElement = document.getElementById('movie-list');
            movieDetailsElement = document.getElementById('movie-details');
            // Initial load of movies
            fetchMovies();
        });
    </script>
</body>
</html>

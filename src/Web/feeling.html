<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phrase Search - Vector Search</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 50px 0;
        }
        .main-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
        }
        .search-title {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: center;
        }
        .search-form {
            margin-bottom: 40px;
        }
        .btn-search {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 40px;
            font-weight: bold;
        }
        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .results-container {
            display: none;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .emotion-badge {
            font-size: 1.2rem;
            padding: 10px 20px;
        }
        .phrase-item {
            transition: all 0.3s;
            border-left: 4px solid #667eea;
            margin-bottom: 10px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .phrase-item:hover {
            transform: translateX(5px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        .progress {
            height: 30px;
            font-size: 1rem;
            font-weight: bold;
        }
        .spinner-border {
            width: 3rem;
            height: 3rem;
        }
        .loading {
            display: none;
            text-align: center;
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-container">
            <h1 class="search-title">
                <i class="bi bi-search"></i> Semantic Phrase Search
            </h1>
            
            <!-- Search form -->
            <div class="search-form">
                <form id="searchForm">
                    <div class="input-group input-group-lg">
                        <input 
                            type="text" 
                            class="form-control" 
                            id="searchInput" 
                            placeholder="How do you feel?..." 
                            required
                            aria-label="I'm feeling..."
                        >
                        <button class="btn btn-primary btn-search" type="submit">
                            <i class="bi bi-search"></i> Search
                        </button>
                    </div>
                </form>
            </div>

            <!-- Loading indicator -->
            <div class="loading" id="loading">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3 text-muted">Searching for results...</p>
            </div>

            <!-- Results container -->
            <div class="results-container" id="resultsContainer">
                <!-- Emotional state -->
                <div class="row mb-4">
                    <div class="col-md-12">
                        <div class="alert alert-info d-flex align-items-center" role="alert">
                            <i id="emotionIcon"></i>
                            <div>
                                <h5 class="alert-heading mb-1">Emotional State</h5>
                                <span class="emotion-badge badge bg-primary" id="emotionValue"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Ranking -->
                <div class="row mb-4">
                    <div class="col-md-12">
                        <h5 class="mb-3">
                            <i class="bi bi-graph-up"></i> Match Level
                        </h5>
                        <div class="progress">
                            <div 
                                class="progress-bar progress-bar-striped progress-bar-animated bg-success" 
                                role="progressbar" 
                                id="rankingBar"
                                style="width: 0%"
                                aria-valuenow="0" 
                                aria-valuemin="0" 
                                aria-valuemax="100"
                            >
                                <span id="rankingValue">0%</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Phrases list -->
                <div class="row">
                    <div class="col-md-12">
                        <h5 class="mb-3">
                            <i class="bi bi-list-ul"></i> Found Phrases
                        </h5>
                        <div id="phrasesList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // API Configuration
        const SEARCH_API_URL = '/vector/api/feeling'; 

        // DOM Elements
        const searchForm = document.getElementById('searchForm');
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');
        const loading = document.getElementById('loading');
        const emotionValue = document.getElementById('emotionValue');
        const emotionIcon = document.getElementById('emotionIcon');
        const rankingBar = document.getElementById('rankingBar');
        const rankingValue = document.getElementById('rankingValue');
        const phrasesList = document.getElementById('phrasesList');

        // Form handler
        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const searchText = searchInput.value.trim();
            if (!searchText) return;

            // Show loading indicator
            loading.style.display = 'block';
            resultsContainer.style.display = 'none';

            try {
                // API call
                const response = await fetch(SEARCH_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text: searchText })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                // Display results
                displayResults(data);

            } catch (error) {
                console.error('Error:', error);
                
                // Show example data in case of error (for demonstration)
                const mockData = {
                    emotion: '',
                    ranking: 0,
                    phrases: [
                        '------------------------',
                        '------------------------',
                        '------------------------',
                        '------------------------',
                        '------------------------'
                    ]
                };
                
                displayResults(mockData);
                
                // Show error message (optional)
                console.warn('Showing example data. Configure the API URL correctly.');
            } finally {
                loading.style.display = 'none';
            }
        });

        // Function to display results
        function displayResults(data) {
            // Extract Feelings array
            const feelings = data.Feelings || [];
            
            // Find the emotion with highest average percentage
            let emotionStats = {};
            feelings.forEach(feeling => {
                if (!emotionStats[feeling.Value]) {
                    emotionStats[feeling.Value] = {
                        count: 0,
                        totalPercentage: 0,
                        maxPercentage: 0,
                        feelings: []
                    };
                }
                emotionStats[feeling.Value].count++;
                emotionStats[feeling.Value].totalPercentage += feeling.Percentage;
                emotionStats[feeling.Value].maxPercentage = Math.max(emotionStats[feeling.Value].maxPercentage, feeling.Percentage);
                emotionStats[feeling.Value].feelings.push(feeling);
            });
            
            // Calculate average percentage for each emotion and find the best one
            let bestValue = 0;
            let bestScore = -1;
            for (let value in emotionStats) {
                const avgPercentage = emotionStats[value].totalPercentage / emotionStats[value].count;
                // Score = average percentage * frequency (combines both frequency and quality)
                const score = avgPercentage * emotionStats[value].count;
                if (score > bestScore) {
                    bestScore = score;
                    bestValue = value;
                }
            }
            
            // Get the feeling with highest percentage for the best emotion
            const mainFeeling = emotionStats[bestValue].feelings.reduce((max, current) => 
                current.Percentage > max.Percentage ? current : max
            );
            
            // Calculate average percentage for the main emotion
            const avgPercentageForMainEmotion = emotionStats[bestValue].totalPercentage / emotionStats[bestValue].count;
            
            // Create a synthetic mainFeeling with average percentage
            const mainFeelingWithAvg = {
                ...mainFeeling,
                Percentage: avgPercentageForMainEmotion
            };
            
            // Emotional state - use the best emotion
            const emotionIcons = ['bi-emoji-tear', 'bi-emoji-smile', 'bi-emoji-heart-eyes', 'bi-emoji-angry', 'bi-emoji-grimace'];
            const emotionNames = ['Sadness', 'Joy', 'Love', 'Anger', 'Fear'];
            const emotionValue_text = mainFeelingWithAvg ? emotionNames[mainFeelingWithAvg.Value] || 'Unknown' : 'Not available';
            emotionValue.textContent = emotionValue_text;
            
            // Update emotion icon based on Value
            if (mainFeelingWithAvg !== null) {
                emotionIcon.className = 'bi ' + emotionIcons[mainFeelingWithAvg.Value] + ' me-3 fs-3';
            } else {
                emotionIcon.className = 'bi bi-emoji-neutral me-3 fs-3';
            }
            
            // Ranking - use average percentage for the best emotion
            const ranking = mainFeelingWithAvg ? mainFeelingWithAvg.Percentage : 0;
            rankingBar.style.width = ranking + '%';
            rankingBar.setAttribute('aria-valuenow', ranking);
            rankingValue.textContent = ranking.toFixed(2) + '%';
            
            // Change bar color based on percentage
            rankingBar.className = 'progress-bar progress-bar-striped progress-bar-animated';
            if (ranking >= 75) {
                rankingBar.classList.add('bg-success');
            } else if (ranking >= 50) {
                rankingBar.classList.add('bg-warning');
            } else {
                rankingBar.classList.add('bg-danger');
            }
            
            // Phrases list
            phrasesList.innerHTML = '';
            if (feelings && feelings.length > 0) {
                feelings.forEach((feeling, index) => {
                    const phraseElement = document.createElement('div');
                    phraseElement.className = 'phrase-item';
                    phraseElement.innerHTML = `
                        <div class="d-flex align-items-center justify-content-between">
                            <div class="d-flex align-items-center flex-grow-1">
                                <span class="badge bg-secondary me-3">${index + 1}</span>
                                <span>${feeling.Text}</span>
                            </div>
                            <span class="badge bg-info ms-3">${feeling.Description}</span>
                            <span class="badge bg-info ms-3">${feeling.Percentage.toFixed(2)}%</span>
                        </div>
                    `;
                    phrasesList.appendChild(phraseElement);
                });
            } else {
                phrasesList.innerHTML = '<p class="text-muted">No phrases found.</p>';
            }
            
            // Show results container
            resultsContainer.style.display = 'block';
        }
    </script>
</body>
</html>
